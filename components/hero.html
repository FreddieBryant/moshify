<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Component</title>
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <section class="block block--dark block-skewed-left hero">
      <div class="container grid grid--1x2">
        <header class="block__header hero__content">
          <h1 class="block__heading hero__heading">Cloud Hosting For Humans</h1>
          <p class="hero__tagline">Deploy your websites in less than 60 seconds</p>
          <a href="#" class="btn btn--accent btn--stretched">Get Started</a>
        </header>
        <img class="hero__image" src="../images//banner.png" alt="Hosting Dashboard Showcase" />
      </div>
    </section>
  </body>
</html>
