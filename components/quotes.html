<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quotes Component</title>
    <!-- Relative paths step out of the components folder correctly -->
    <link rel="stylesheet" href="../css/normalize.css" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="preconnect" href="https://googleapis.com" />
    <link rel="preconnect" href="https://gstatic.com" crossorigin />
    <link
      href="https://googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <blockquote class="quote">
      <p class="quote__text">
        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Modi sunt sequi molestias quae,
        suscipit aliquid ducimus alias veritatis perferendis recusandae!
      </p>
      <footer>
        <!-- Mosh uses the media container block to hold the layout horizontally -->
        <div class="media">
          <!-- The line comes first so it sits on the left side -->
          <div class="media__image quote__line">
            <svg class="icon icon--primary">
              <use xlink:href="../images/sprite.svg#line"></use>
            </svg>
          </div>
          <!-- The text data forms the right column next to the line -->
          <div class="media__body">
            <h3 class="media__title quote__author">John Smith</h3>
            <p class="media__description quote__company">ABC Company</p>
          </div>
        </div>
      </footer>
    </blockquote>
  </body>
</html>
